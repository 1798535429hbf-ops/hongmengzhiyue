spring.application.name=HongmengZhiYue
server.port=${SERVER_PORT:8081}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/hongmeng_zhiyue?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8001}
