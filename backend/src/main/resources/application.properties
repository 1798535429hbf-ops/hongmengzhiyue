spring.application.name=HongmengZhiYue
server.port=${SERVER_PORT:8081}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/hongmeng_zhiyue?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# AI 服务 — Python AI 网关（内部中转 DeepSeek API）
ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8001}

# DeepSeek 配置（由 Python AI 服务读取 .env 文件中的 DEEPSEEK_API_KEY）
# 如需绕过 Python 服务直接调用，可在此配置：
# deepseek.api.key=${DEEPSEEK_API_KEY:}
# deepseek.api.model=${DEEPSEEK_MODEL:deepseek-chat}
# deepseek.api.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
